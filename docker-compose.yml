services:
  mirofish:
    build: .
    image: mirofish:local
    # To use the upstream image instead of building locally, comment out 'build' and uncomment below:
    # image: ghcr.io/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads